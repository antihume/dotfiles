# --- Video output & hardware decoding ----------------------------------------
vo=gpu-next
gpu-api=vulkan
hwdec=nvdec
gpu-shader-cache=yes

# --- High-quality scaling ----------------------------------------------------
scale=ewa_lanczossharp
scale-antiring=0.7
dscale=hermite
cscale=ewa_lanczossoft
sigmoid-upscaling=yes
correct-downscaling=yes
linear-downscaling=no

# --- Debanding ---------------------------------------------------------------
deband=yes
deband-iterations=4
deband-threshold=32
deband-range=16
deband-grain=6

# --- Motion interpolation ----------------------------------------------------
video-sync=audio
interpolation=yes
tscale=sphinx
tscale-blur=0.6991556596428412
tscale-radius=1.0
tscale-clamp=0.0

# --- Subtitles ---------------------------------------------------------------
sub-auto=fuzzy
sub-font-size=48
blend-subtitles=yes

# --- Performance / cache -----------------------------------------------------
cache=yes
demuxer-max-bytes=256MiB
demuxer-max-back-bytes=64MiB
demuxer-readahead-secs=10

# --- Quality of life ---------------------------------------------------------
save-position-on-quit=yes
keep-open=yes

# --- Screenshot quality ------------------------------------------------------
screenshot-format=png
screenshot-high-bit-depth=yes
screenshot-directory=~/Pictures/mpv

# --- Audio / A/V sync --------------------------------------------------------
audio-file-auto=fuzzy
audio-pitch-correction=yes

# --- Window behavior ---------------------------------------------------------
geometry=50%:50%
autofit-larger=90%x90%

# --- Playback ---------------------------------------------------------------
loop-playlist=inf
ytdl-format="bv*[height<=1440][fps<=60]+ba/b"

# --- OSD (on-screen display) -------------------------------------------------
osd-duration=2000
osd-font-size=32

# --- Language preferences ----------------------------------------------------
alang=jpn,jp,japanese,eng,en,english
slang=eng,en,english
